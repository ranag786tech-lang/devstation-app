<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>DevStation | DigitalDairy786</title>

  <meta name="application-name"    content="DevStation"/>
  <meta name="mobile-web-app-capable"         content="yes"/>
  <meta name="apple-mobile-web-app-capable"   content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color"         content="#111111"/>

  <link rel="manifest" href="manifest.json"/>

  <link rel="icon"             href="icons/icon-192.png" type="image/png"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

<style>
/* =============================================
   1. RESET & FULL SCREEN FIX
============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111111;
  --panel: #1a1a1a;
  --accent: #a07840;
  --text: #e8e8e8;
  --border: #333333;
}

html, body { 
    height: 100dvh; /* Dynamic Viewport for Mobile */
    width: 100vw;
    overflow: hidden; 
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    position: fixed; /* Scrolling prevention */
}

/* Main Container - Poori Screen occupy karega */
#main-wrapper {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
}

/* =============================================
   2. UI COMPONENTS
============================================= */
#titlebar {
    height: 50px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 15px;
    justify-content: space-between;
    flex-shrink: 0;
}

.logo { font-weight: bold; color: var(--accent); display: flex; align-items: center; gap: 8px; }

#app-container {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
}

#editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
}

/* CodeMirror Height Fix */
.CodeMirror {
    height: 100% !important;
    font-size: 14px;
    background: transparent !important;
}

#preview-pane {
    width: 40%;
    background: white;
    border-left: 1px solid var(--border);
    display: block;
}

/* Mobile Adjustments */
@media (max-width: 768px) {
    #preview-pane { display: none; } /* Mobile par preview hide */
    .logo span { display: none; }
}

/* Action Buttons */
.btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 6px 15px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
}
</style>
</head>
<body>

<div id="main-wrapper">
    <header id="titlebar">
        <div class="logo">
            <img src="icons/icon-96.png" width="24" height="24" alt="logo">
            <span>DevStation</span>
        </div>
        <div class="actions">
            <button class="btn" onclick="runCode()">RUN</button>
            <button class="btn" onclick="syncEditorState()" style="background:#333; margin-left:5px;">SAVE</button>
        </div>
    </header>

    <main id="app-container">
        <div id="editor-pane">
            <div id="cm-editor-instance"></div>
        </div>
        <div id="preview-pane">
            <iframe id="live-preview" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </main>

    <footer style="height:25px; background:var(--panel); border-top:1px solid var(--border); font-size:10px; display:flex; align-items:center; padding:0 10px; color:#777;">
        Status: Ready | v2026.03.15 | DigitalDairy786
    </footer>
</div>

<script>
    // 1. Initialize Global Objects
    var currentFile = 'index.html';
    var FILES = { 'index.html': { content: '<h1>Hello DevStation!</h1>' } };
    var editor;

    // 2. Setup CodeMirror
    window.addEventListener('load', function() {
        editor = CodeMirror(document.getElementById('cm-editor-instance'), {
            value: FILES[currentFile].content,
            mode: 'htmlmixed',
            theme: 'material-darker',
            lineNumbers: true,
            autoCloseBrackets: true,
            matchBrackets: true
        });
    });

    // 3. Live Preview Logic
    function runCode() {
        const content = editor.getValue();
        const iframe = document.getElementById('live-preview');
        const frameDoc = iframe.contentDocument || iframe.contentWindow.document;
        frameDoc.open();
        frameDoc.write(content);
        frameDoc.close();
        if(window.innerWidth <= 768) alert("Preview updated! Use Desktop mode for side-by-side view.");
    }
</script>

<script src="devstation-logic.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => console.log('SW OK')).catch(err => console.log('SW Fail'));
  });
}
</script>

</body>
</html>
