<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevStation | DigitalDairy786</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a07840">
    <link rel="icon" href="icons/icon-192.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/javascript/javascript.min.js"></script>

    <style>
        :root {
            --bg-color: #111111;
            --sidebar-bg: #1a1a1a;
            --accent: #a07840;
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg-color); color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* VS Code Style Layout */
        .app-container {
            display: flex; height: 100vh; width: 100vw;
        }

        .sidebar {
            width: 250px; background: var(--sidebar-bg);
            border-right: 1px solid #333; display: flex; flex-direction: column;
        }

        .main-editor {
            flex: 1; display: flex; flex-direction: column;
        }

        .header {
            height: 40px; background: #222; display: flex; 
            align-items: center; padding: 0 15px; border-bottom: 1px solid #333;
        }

        #editor-container { flex: 1; position: relative; }
        .CodeMirror { height: 100% !important; font-size: 14px; }

        .bottom-panel {
            height: 200px; background: #000; border-top: 1px solid #333;
            display: flex; flex-direction: column;
        }

        .panel-tabs {
            display: flex; background: #1a1a1a; padding: 5px; font-size: 12px;
        }

        .tab { padding: 5px 15px; cursor: pointer; opacity: 0.6; }
        .tab.active { border-bottom: 2px solid var(--accent); opacity: 1; }

        #terminal-output {
            flex: 1; padding: 10px; font-family: 'Courier New', monospace;
            color: #00ff00; overflow-y: auto; font-size: 13px;
        }

        .preview-pane {
            width: 300px; background: #fff; border-left: 1px solid #333;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar, .preview-pane { display: none; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid #333;">EXPLORER</div>
        <div id="file-list" style="padding: 10px; font-size: 13px;">
            <div onclick="loadFile('index.html')" style="cursor:pointer; padding: 5px;">📄 index.html</div>
            <div onclick="loadFile('logic.js')" style="cursor:pointer; padding: 5px;">📜 devstation-logic.js</div>
        </div>
    </div>

    <div class="main-editor">
        <div class="header">
            <span id="active-file-name">index.html</span>
            <button onclick="triggerBuild()" style="margin-left: auto; background: var(--accent); border: none; color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer;">Deploy to GitHub</button>
        </div>
        
        <div id="editor-container"></div>

        <div class="bottom-panel">
            <div class="panel-tabs">
                <div class="tab active" onclick="switchBottomPanel('console')">TERMINAL</div>
                <div class="tab" onclick="switchBottomPanel('output')">OUTPUT</div>
            </div>
            <div id="terminal-output">> Ready for development...</div>
        </div>
    </div>

    <iframe id="live-preview" class="preview-pane" src="about:blank"></iframe>
</div>

<script>
    // Initialize CodeMirror Editor
    var editor = CodeMirror(document.getElementById("editor-container"), {
        lineNumbers: true,
        theme: "monokai",
        mode: "javascript",
        value: "<!DOCTYPE html>\n<html>\n<body>\n<h1>Hello DevStation</h1>\n</body>\n</html>"
    });

    var currentFile = "index.html";
    var FILES = {
        "index.html": { content: "" },
        "logic.js": { content: "" }
    };

    // Global Functions for devstation-logic.js compatibility
    function notify(type, msg) {
        const term = document.getElementById('terminal-output');
        term.innerHTML += `<div style="color: ${type === 'ok' ? '#00ff00' : '#ffa500'}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        term.scrollTop = term.scrollHeight;
    }

    function conLog(type, msg) {
        notify(type, msg);
    }

    function switchBottomPanel(panel) {
        console.log("Switched to: " + panel);
    }

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("DevStation Service Worker Active"));
    }
</script>

<script src="devstation-logic.js"></script>

</body>
</html>
