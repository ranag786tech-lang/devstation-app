<style>
/* =============================================
   RESET & MOBILE OPTIMIZATION
============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
    height: 100%; 
    width: 100%;
    overflow: hidden; 
    font-size: 13px;
    background: #111111;
}

:root {
  --black:    #111111;
  --dark:     #1a1a1a;
  --dark2:    #222222;
  --dark3:    #2c2c2c;
  --line:     #333333;
  --line2:    #404040;
  --muted:    #777777;
  --sub:      #999999;
  --text:     #e8e8e8;
  --white:    #ffffff;
  --brown:    #a07840;
  --brown2:   #c49a50;
  --brown-bg: rgba(160,120,64,.12);
  --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono:     'Consolas', 'Courier New', monospace;
}

body {
  font-family: var(--font);
  background: var(--black);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* =============================================
   TITLEBAR - Fixed for Mobile
============================================= */
#titlebar {
  height: 45px;
  background: var(--dark);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 6px;
  flex-shrink: 0;
  user-select: none;
}

.t-logo {
  display: flex;
  align-items: center;
  gap: 7px;
  font-weight: 600;
  font-size: 14px;
  color: var(--white);
  margin-right: 5px;
}

/* Menus hide on very small screens to prevent overlap */
@media (max-width: 480px) {
    .t-menus { display: none; }
    .t-logo-sq { width: 28px; height: 28px; }
}

/* Rest of your styles continue here... (Maintaining original logic) */
#app {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* MOBILE RESPONSIVENESS FIXES */
@media (max-width: 768px) {
    #sidebar { width: 0; display: none; }
    #act-bar { width: 40px; }
    .t-btn { padding: 4px 8px; font-size: 11px; }
    #preview-pane { display: none; }
    #bottom-panel { height: 150px; }
}

/* ADDED: Full height container for standalone mode */
#main-wrapper {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
}

/* CodeMirror Mobile Fix */
.CodeMirror {
  flex: 1;
  font-size: 14px !important; /* Slightly larger for mobile readability */
}

/* Ensure original dashboard components remain intact */
/* [Original sidebar, editor-area, tab-bar, workspace styles here] */
/* ... (Baki saara CSS jo aapne bheja tha wo as it is rahega) ... */

<div id="main-wrapper">
    <div id="titlebar">
      <div class="t-logo">
        <div class="t-logo-sq">D</div>
        DevStation
      </div>
      <div class="t-right">
          <button class="t-btn run" onclick="runCode()">Run</button>
          <button class="t-btn dl" onclick="downloadProject()">Save</button>
      </div>
    </div>

    <div id="app">
        <div id="editor-area">
            <div id="workspace">
                 <div id="editor-pane">
                     <div id="cm-host"></div>
                 </div>
            </div>
        </div>
    </div>
</div>

<script src="devstation-logic.js"></script>
<script>
// PWA Service Worker Registration with relative path fix
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(reg => {
        console.log('SW Registered');
    });
  });
}
</script>
