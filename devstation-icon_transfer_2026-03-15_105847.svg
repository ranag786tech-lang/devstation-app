<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="brown-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c49a50"/>
      <stop offset="100%" stop-color="#a07840"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg-grad)"/>

  <!-- Subtle border -->
  <rect width="256" height="256" rx="52" ry="52"
        fill="none" stroke="#333" stroke-width="2"/>

  <!-- Top bar (like editor titlebar) -->
  <rect x="0" y="0" width="256" height="38" rx="52" ry="52"
        fill="#1e1e1e"/>
  <rect x="0" y="20" width="256" height="18" fill="#1e1e1e"/>
  <rect x="0" y="36" width="256" height="2" fill="#333"/>

  <!-- Window dots -->
  <circle cx="36" cy="20" r="6" fill="#f85149" opacity=".85"/>
  <circle cx="56" cy="20" r="6" fill="#d29922" opacity=".85"/>
  <circle cx="76" cy="20" r="6" fill="#3fb950" opacity=".85"/>

  <!-- Brown accent top line -->
  <rect x="0" y="36" width="256" height="3" fill="url(#brown-grad)" rx="1"/>

  <!-- Line numbers area -->
  <rect x="24" y="52" width="36" height="160" rx="0" fill="#161616"/>
  <rect x="60" y="52" width="1"  height="160" fill="#2c2c2c"/>

  <!-- Line number ticks -->
  <rect x="30" y="68"  width="18" height="2" rx="1" fill="#444"/>
  <rect x="30" y="84"  width="14" height="2" rx="1" fill="#3a3a3a"/>
  <rect x="30" y="100" width="18" height="2" rx="1" fill="#444"/>
  <rect x="30" y="116" width="12" height="2" rx="1" fill="#3a3a3a"/>
  <rect x="30" y="132" width="18" height="2" rx="1" fill="#444"/>
  <rect x="30" y="148" width="16" height="2" rx="1" fill="#3a3a3a"/>
  <rect x="30" y="164" width="18" height="2" rx="1" fill="#444"/>
  <rect x="30" y="180" width="14" height="2" rx="1" fill="#3a3a3a"/>

  <!-- Code lines (main area) -->
  <!-- Line 1: keyword + text -->
  <rect x="74" y="65"  width="28" height="8" rx="3" fill="#c49a50" opacity=".9"/>
  <rect x="108" y="65" width="52" height="8" rx="3" fill="#4a4a4a"/>
  <rect x="166" y="65" width="32" height="8" rx="3" fill="#3a7a5a" opacity=".8"/>

  <!-- Line 2: indent -->
  <rect x="86" y="81"  width="18" height="8" rx="3" fill="#4a4a4a"/>
  <rect x="110" y="81" width="44" height="8" rx="3" fill="#79c0ff" opacity=".8"/>
  <rect x="160" y="81" width="24" height="8" rx="3" fill="#4a4a4a"/>

  <!-- Line 3: brown accent -->
  <rect x="86" y="97"  width="32" height="8" rx="3" fill="#c49a50" opacity=".7"/>
  <rect x="124" y="97" width="56" height="8" rx="3" fill="#98c379" opacity=".8"/>

  <!-- Line 4: comment (italic feel) -->
  <rect x="74" y="113" width="88" height="8" rx="3" fill="#4a5a4a" opacity=".7"/>

  <!-- Line 5 -->
  <rect x="86" y="129" width="22" height="8" rx="3" fill="#4a4a4a"/>
  <rect x="114" y="129" width="38" height="8" rx="3" fill="#c49a50" opacity=".9"/>
  <rect x="158" y="129" width="28" height="8" rx="3" fill="#79c0ff" opacity=".7"/>

  <!-- Line 6: short -->
  <rect x="86" y="145" width="16" height="8" rx="3" fill="#4a4a4a"/>
  <rect x="108" y="145" width="52" height="8" rx="3" fill="#98c379" opacity=".6"/>

  <!-- Line 7 -->
  <rect x="74" y="161" width="28" height="8" rx="3" fill="#c49a50" opacity=".7"/>
  <rect x="108" y="161" width="40" height="8" rx="3" fill="#4a4a4a"/>

  <!-- Cursor blink line -->
  <rect x="74" y="177" width="2" height="12" rx="1" fill="#c49a50" opacity=".95"/>

  <!-- Active line highlight -->
  <rect x="62" y="174" width="170" height="18" rx="2"
        fill="#c49a50" opacity=".07"/>

  <!-- Bottom status bar -->
  <rect x="0" y="218" width="256" height="38" rx="0" fill="#1e3a2a"/>
  <rect x="0" y="236" width="256" height="20" rx="0" fill="#1e3a2a"/>
  <rect x="0" y="236" width="256" height="20"
        rx="52" ry="52" fill="#1e3a2a"/>

  <!-- Status items -->
  <rect x="16" y="228" width="30" height="6" rx="3" fill="#7dbe9e" opacity=".7"/>
  <rect x="54" y="228" width="22" height="6" rx="3" fill="#7dbe9e" opacity=".5"/>
  <rect x="84" y="228" width="16" height="6" rx="3" fill="#7dbe9e" opacity=".5"/>

  <!-- "D" letter watermark subtle -->
  <text x="196" y="210" font-family="'Segoe UI', sans-serif"
        font-size="52" font-weight="700"
        fill="url(#brown-grad)" opacity=".12">D</text>
</svg>
